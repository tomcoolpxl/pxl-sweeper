name: CD (Production Deployment)

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update Release Description
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          # Fetch existing release notes and append the live demo link
          gh release view ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --json body --template '{{.body}}' > release_notes.txt
          echo -e "\n\n---\n🚀 **Live Demo:** [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> release_notes.txt
          
          # Update the release with the new notes file
          gh release edit ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --notes-file release_notes.txt
